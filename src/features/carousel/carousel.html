<div class="carousel-container">
  <button class="nav-btn prev" (click)="prev()">❮</button>

  <div class="carousel-content">
    @if (items().length > 0) {
      <div class="slide">
        <div class="image-wrapper" [style.width]="width()">
          <img [src]="items()[0].image" [alt]="items()[0].description" />
        </div>
        <p class="description">{{ items()[0].description }}</p>
      </div>
    } @else {
      <p>Brak zdjęć do wyświetlenia</p>
    }
  </div>

  <button class="nav-btn next" (click)="next()">❯</button>
</div>
